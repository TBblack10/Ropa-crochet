<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión · Punto Tierra</title>
<meta name="description" content="Iniciá sesión o creá tu cuenta en Punto Tierra.">
<link rel="icon" href="data:,">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header site-header--minimal">
  <div class="topbar">
    <div class="container topbar-inner">
      <a href="index.html" class="logo">
        <span class="logo-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="7.5"/><path d="M7 9c2 1.5 2 4.5 0 6M12 6.2c1.7 2.3 1.7 9.3 0 11.6M17 9c-2 1.5-2 4.5 0 6"/></svg>
        </span>
        <span class="logo-text">
          <strong>Punto Tierra</strong>
          <small>Tejidos artesanales · Buenos Aires</small>
        </span>
      </a>
      <a href="index.html" class="auth-back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Volver a la tienda
      </a>
    </div>
  </div>
</header>

<main class="auth-main">
  <div class="auth-card">

    <div class="auth-tabs" role="tablist">
      <button class="auth-tab active" id="tabLogin" role="tab" aria-selected="true">Iniciar sesión</button>
      <button class="auth-tab" id="tabRegister" role="tab" aria-selected="false">Crear cuenta</button>
    </div>

    <p class="auth-error" id="authError" hidden></p>

    <!-- ---------- LOGIN ---------- -->
    <form class="auth-form" id="loginForm">
      <label class="field">
        <span>Email</span>
        <input type="email" id="loginEmail" required placeholder="vos@email.com" autocomplete="email">
      </label>
      <label class="field">
        <span>Contraseña</span>
        <input type="password" id="loginPassword" required placeholder="••••••••" autocomplete="current-password">
      </label>
      <button type="submit" class="btn btn-terracotta auth-submit">Iniciar sesión</button>
    </form>

    <!-- ---------- REGISTER ---------- -->
    <form class="auth-form" id="registerForm" hidden>
      <label class="field">
        <span>Nombre</span>
        <input type="text" id="registerName" required placeholder="Tu nombre">
      </label>
      <label class="field">
        <span>Email</span>
        <input type="email" id="registerEmail" required placeholder="vos@email.com" autocomplete="email">
      </label>
      <label class="field">
        <span>Contraseña</span>
        <input type="password" id="registerPassword" required minlength="4" placeholder="Mínimo 4 caracteres" autocomplete="new-password">
      </label>
      <button type="submit" class="btn btn-terracotta auth-submit">Crear cuenta</button>
    </form>

    <div class="auth-divider"><span>o</span></div>

    <button class="btn btn-outline auth-google" id="googleBtn">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.24 1.4-1.7 4.1-5.5 4.1-3.3 0-6-2.7-6-6.2s2.7-6.2 6-6.2c1.9 0 3.2.8 3.9 1.5l2.7-2.6C16.9 3.1 14.7 2.1 12 2.1 6.9 2.1 2.7 6.3 2.7 11.4S6.9 20.7 12 20.7c6.9 0 9.2-4.8 9.2-7.3 0-.5 0-.9-.1-1.2H12z"/>
      </svg>
      Continuar con Google
    </button>

    <p class="auth-mock-note">Esto es una simulación de login para el prototipo: los datos quedan guardados solo en tu navegador (localStorage).</p>
  </div>
</main>

<script src="js/cart.js"></script>
<script src="js/auth.js"></script>
<script src="js/login.js"></script>
</body>
</html>
